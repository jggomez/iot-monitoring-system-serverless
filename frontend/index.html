<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Sensor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDK -->
    <script type="module" src="./src/app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900">IoT Sensor Station</h1>
                <p class="text-slate-500">Real-time monitoring of temperature and humidity</p>
            </div>
            <div class="flex items-center space-x-4">
                <button id="download-csv-btn" class="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span>Export CSV</span>
                </button>
                <div class="flex items-center space-x-2 bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-medium">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span>Live</span>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Temperature Card -->
            <div class="glass p-6 rounded-2xl border border-white shadow-sm transition-all hover:shadow-md">
                <div class="flex justify-between items-start mb-4">
                    <span class="p-2 bg-orange-100 rounded-lg">
                        <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    </span>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Current Temperature</span>
                </div>
                <div class="flex items-baseline space-x-1">
                    <h2 id="current-temp" class="text-4xl font-bold">--</h2>
                    <span class="text-xl text-slate-500 font-medium">°C</span>
                </div>
                <div class="mt-4 text-sm">
                    <span class="text-slate-400">Average: </span>
                    <span id="avg-temp" class="font-semibold">-- °C</span>
                </div>
            </div>

            <!-- Humidity Card -->
            <div class="glass p-6 rounded-2xl border border-white shadow-sm transition-all hover:shadow-md">
                <div class="flex justify-between items-start mb-4">
                    <span class="p-2 bg-blue-100 rounded-lg">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </span>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Current Humidity</span>
                </div>
                <div class="flex items-baseline space-x-1">
                    <h2 id="current-humidity" class="text-4xl font-bold">--</h2>
                    <span class="text-xl text-slate-500 font-medium">%</span>
                </div>
                <div class="mt-4 text-sm">
                    <span class="text-slate-400">Average: </span>
                    <span id="avg-humidity" class="font-semibold">-- %</span>
                </div>
            </div>

            <!-- Last Update Card -->
            <div class="glass p-6 rounded-2xl border border-white shadow-sm transition-all hover:shadow-md">
                <div class="flex justify-between items-start mb-4">
                    <span class="p-2 bg-purple-100 rounded-lg">
                        <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </span>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Last Reading</span>
                </div>
                <h2 id="last-update" class="text-2xl font-bold py-2 text-slate-700">--</h2>
                <p id="device-state" class="text-sm font-medium px-2 py-1 bg-slate-100 text-slate-600 rounded inline-block">Status: --</p>
            </div>
        </div>

        <!-- Device Controls -->
        <div class="glass p-6 rounded-2xl border border-white shadow-sm mb-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between space-y-4 md:space-y-0">
                <div>
                    <h3 class="text-lg font-bold text-slate-800">Remote Controls</h3>
                    <p class="text-sm text-slate-500">Send commands to the IoT device via MQTT</p>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="flex flex-col items-end">
                        <span id="switch-status-label" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Device Power</span>
                        <div class="flex items-center bg-white p-1.5 rounded-2xl shadow-inner border border-slate-100">
                            <span id="toggle-state-text" class="text-xs font-black text-slate-400 mr-3 ml-2 transition-colors">OFF</span>
                            <button id="device-toggle-btn" class="relative inline-flex h-9 w-16 items-center rounded-full bg-slate-200 transition-all duration-300 ease-in-out focus:outline-none ring-offset-2 disabled:opacity-50 group shadow-sm hover:shadow-md" aria-pressed="false">
                                <span id="toggle-dot" class="inline-block h-7 w-7 transform rounded-full bg-white shadow-lg transition-transform duration-300 ease-in-out translate-x-1 group-hover:scale-105"></span>
                            </button>
                            <span id="toggle-state-text-on" class="hidden text-xs font-black text-blue-600 mr-2 ml-3 transition-colors">ON</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="glass p-8 rounded-3xl border border-white shadow-xl overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-800">Sensor History</h3>
                <div class="flex space-x-2">
                    <span class="flex items-center text-xs font-medium text-orange-500">
                        <span class="w-3 h-3 bg-orange-500 rounded-full mr-1"></span> Temp
                    </span>
                    <span class="flex items-center text-xs font-medium text-blue-500">
                        <span class="w-3 h-3 bg-blue-500 rounded-full mr-1"></span> Hum
                    </span>
                </div>
            </div>
            <div class="relative h-[400px]">
                <canvas id="sensorChart"></canvas>
            </div>
        </div>
    </div>
</body>
</html>
